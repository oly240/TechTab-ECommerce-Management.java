# Nume Aplicatie
spring.application.name=TechTabShop

# --- CONEXIUNE SQL SERVER ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AplicatieTablete;encrypt=false;trustServerCertificate=true;
spring.datasource.username=java_user
spring.datasource.password=Test1234!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / HIBERNATE SETTINGS ---
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- WEB SERVER ---
server.port=8081

# --- THYMELEAF ---
spring.thymeleaf.cache=false